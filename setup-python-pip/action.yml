name: "Setup Python with pip"
description: "Install Python via the official actions/setup-python action. Thin wrapper for consistent DRS naming."
category: "Language & runtime setup"
inputs:
  python-version:
    description: "Python version to install (e.g. '3.12', '3.x'). Uses system default if empty."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
