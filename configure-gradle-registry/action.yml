name: "Configure Gradle private registry"
description: "Configure Gradle to use a private Maven repository via init script. Use in the initialize section of your blueprint."
category: "Private registries"
inputs:
  repo-url:
    description: "Repository URL (e.g. 'https://nexus.corp.com/repository/maven-releases/')"
    required: true
  username:
    description: "Username for authentication. Use $SECRET_NAME syntax in blueprints."
    required: false
    default: ""
  password:
    description: "Password or token. Use $SECRET_NAME syntax in blueprints."
    required: false
    default: ""
runs:
  using: "node20"
  main: "dist/index.js"
