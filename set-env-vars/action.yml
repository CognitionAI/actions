name: "Set environment variables"
description: "Set persistent environment variables via ENVRC and /etc/profile.d. Use in the initialize section of your blueprint."
category: "Enterprise infrastructure"
inputs:
  env-vars:
    description: "Newline-separated KEY=VALUE pairs (e.g. 'DATABASE_URL=postgres://...'). Values can reference secrets with $SECRET_NAME."
    required: true
runs:
  using: "node20"
  main: "dist/index.js"
