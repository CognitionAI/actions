name: "Setup Rust"
description: "Install the Rust toolchain via dtolnay/rust-toolchain. Thin wrapper for consistent DRS naming."
category: "Language & runtime setup"
inputs:
  toolchain:
    description: "Rust toolchain to install (e.g. 'stable', 'nightly', '1.80.0'). Defaults to 'stable'."
    required: false
    default: "stable"
  components:
    description: "Comma-separated list of components to install (e.g. 'clippy, rustfmt')."
    required: false
    default: ""
  targets:
    description: "Comma-separated list of target triples to install."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}
